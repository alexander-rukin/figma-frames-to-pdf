<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: var(--figma-color-bg, #fff);
        --text: var(--figma-color-text, #1a1a1a);
        --text-secondary: var(--figma-color-text-secondary, #6b6b6b);
        --border: var(--figma-color-border, #e6e6e6);
        --input-bg: var(--figma-color-bg-secondary, #f5f5f5);
        --hover: var(--figma-color-bg-hover, #f0f0f0);
        --accent: var(--figma-color-bg-brand, #0d99ff);
        --accent-text: var(--figma-color-text-onbrand, #fff);
        --error: var(--figma-color-text-danger, #e03131);
        --success: var(--figma-color-text-success, #2f9e44);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        padding: 14px;
        font: 12px/1.45 "Inter", -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 { font-size: 13px; margin: 0; }
      h1 .ver { font-size: 10px; font-weight: 400; color: var(--text-secondary); }
      label { display: block; font-weight: 600; margin: 0 0 6px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row > .grow { flex: 1; }
      input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 7px 9px;
        font: inherit;
        color: var(--text);
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
      }
      input:focus, select:focus { border-color: var(--accent); }

      /* ---- frame list ---- */
      .list-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        color: var(--text-secondary);
      }
      .list-head .hint { font-size: 11px; }
      #list {
        flex: 1;
        min-height: 80px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px;
        border-radius: 6px;
        cursor: grab;
        user-select: none;
      }
      .item:hover { background: var(--hover); }
      .item.dragging { opacity: 0.5; }
      .item .handle { color: var(--text-secondary); cursor: grab; font-size: 14px; }
      .item .num {
        min-width: 18px;
        text-align: right;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }
      .item .thumb {
        width: 46px;
        height: 34px;
        flex: 0 0 auto;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .item .thumb img { max-width: 100%; max-height: 100%; display: block; }
      .item .meta { flex: 1; min-width: 0; }
      .item .name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 500;
      }
      .item .dim { color: var(--text-secondary); font-size: 11px; }
      .item.excluded { opacity: 0.45; }
      .empty { padding: 24px 8px; text-align: center; color: var(--text-secondary); }

      /* ---- options ---- */
      details.opts { border-top: 1px solid var(--border); padding-top: 8px; }
      details.opts > summary {
        cursor: pointer;
        font-weight: 600;
        list-style: none;
      }
      details.opts > summary::-webkit-details-marker { display: none; }
      details.opts > summary::before { content: "▸ "; color: var(--text-secondary); }
      details.opts[open] > summary::before { content: "▾ "; }
      .opts-body { padding-top: 10px; display: flex; flex-direction: column; gap: 10px; }
      .checkbox { display: flex; align-items: center; gap: 8px; }
      .checkbox input { width: auto; }
      .checkbox label { margin: 0; font-weight: 400; }
      #custom { display: none; gap: 8px; }
      #custom.show { display: flex; }
      .slider { display: flex; align-items: center; gap: 8px; }
      .slider input[type="range"] { flex: 1; }
      .slider .val { min-width: 34px; text-align: right; color: var(--text-secondary); }

      button {
        width: 100%;
        padding: 10px;
        font: inherit;
        font-weight: 600;
        color: var(--accent-text);
        background: var(--accent);
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: default; }

      #progress-wrap {
        display: none;
        height: 6px;
        background: var(--input-bg);
        border-radius: 3px;
        overflow: hidden;
      }
      #progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.15s ease; }
      .status { min-height: 16px; color: var(--text-secondary); }
      .status.error { color: var(--error); }
      .status.success { color: var(--success); }

      .header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .menu { position: relative; }
      #menu-btn {
        width: 28px;
        height: 24px;
        padding: 0;
        font-size: 16px;
        line-height: 1;
        color: var(--text-secondary);
        background: transparent;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
      }
      #menu-btn:hover { background: var(--hover); color: var(--text); }
      .menu-pop {
        position: absolute;
        top: 28px;
        right: 0;
        z-index: 10;
        min-width: 130px;
        padding: 4px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
      }
      .menu-pop[hidden] { display: none; }
      .menu-pop button {
        width: 100%;
        padding: 7px 10px;
        font: inherit;
        text-align: left;
        color: var(--text);
        background: transparent;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .menu-pop button:hover { background: var(--hover); }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Frames → PDF <span class="ver"><!-- VERSION --></span></h1>
      <div class="menu">
        <button id="menu-btn" type="button" aria-label="More actions">⋯</button>
        <div id="menu-pop" class="menu-pop" hidden>
          <button id="copy-log" type="button">Copy logs</button>
        </div>
      </div>
    </div>

    <div class="list-head">
      <span id="count">Loading frames…</span>
      <span class="hint">drag to reorder</span>
    </div>

    <div class="row">
      <select id="sort" class="grow">
        <option value="position">Order: by position</option>
        <option value="selection">Order: by selection</option>
      </select>
    </div>

    <div id="list"></div>

    <details class="opts">
      <summary>Output options</summary>
      <div class="opts-body">
        <div>
          <label for="filename">File name</label>
          <input id="filename" type="text" value="export.pdf" />
        </div>

        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="compact" selected>Compact — small file, selectable text + links (recommended)</option>
            <option value="vector">Vector — crisp at any zoom, larger file</option>
          </select>
        </div>

        <div id="compact-opts" style="display:flex; flex-direction:column; gap:10px;">
          <div>
            <label for="raster-scale">Raster resolution</label>
            <select id="raster-scale">
              <option value="2">2× — sharp (bigger)</option>
              <option value="1.5" selected>1.5× — balanced</option>
              <option value="1">1× — smallest</option>
            </select>
          </div>
          <div>
            <label for="compact-quality">JPEG quality</label>
            <div class="slider">
              <input id="compact-quality" type="range" min="40" max="95" step="5" value="80" />
              <span class="val" id="compact-quality-val">80%</span>
            </div>
          </div>
        </div>

        <div id="vector-opts" style="display:none; flex-direction:column; gap:10px;">
          <div>
            <label for="image-quality">Image quality</label>
            <select id="image-quality">
              <option value="high" selected>High — cap 2400px (recommended)</option>
              <option value="medium">Medium — cap 1600px</option>
              <option value="low">Low — cap 1200px (smallest)</option>
              <option value="original">Original — don't recompress</option>
              <option value="custom">Custom…</option>
            </select>
          </div>

          <div id="custom">
            <div class="grow">
              <label for="max-dim">Max px</label>
              <input id="max-dim" type="number" min="200" max="6000" step="100" value="1800" />
            </div>
            <div class="grow">
              <label for="quality">JPEG quality</label>
              <div class="slider">
                <input id="quality" type="range" min="40" max="100" step="5" value="80" />
                <span class="val" id="quality-val">80%</span>
              </div>
            </div>
          </div>

          <div class="checkbox">
            <input id="dedupe" type="checkbox" checked />
            <label for="dedupe">De-duplicate shared fonts &amp; images</label>
          </div>
        </div>
      </div>
    </details>

    <button id="export">Export to PDF</button>

    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="status" class="status"></div>

    <pre id="log" hidden></pre>

    <!-- BUNDLE -->
  </body>
</html>
